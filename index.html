<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창원경일고 진로별 과목 선택 가이드 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#07111e; --s1:#0f1b2d; --s2:#162036; --s3:#1c2a42;
  --b1:#1e3a5f44; --b2:#2d4a7a66;
  --blue:#3b82f6; --blue2:#1d4ed8; --green:#10b981;
  --yellow:#f59e0b; --red:#ef4444; --purple:#8b5cf6;
  --text:#e2e8f0; --t2:#94a3b8; --t3:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ── 헤더 ── */
header{
  background:linear-gradient(135deg,#071628 0%,#0f1b2d 100%);
  border-bottom:1px solid var(--b2);
  padding:20px 36px 0; position:sticky; top:0; z-index:100;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.hdr-title h1{font-size:18px;font-weight:900;letter-spacing:-0.5px;}
.hdr-title p{font-size:11px;color:var(--t3);margin-top:5px;font-family:'DM Mono',monospace;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;}
.badge.school{background:#f59e0b22;border:1px solid #f59e0b55;color:#fcd34d;}
.badge.ver{background:#3b82f622;border:1px solid #3b82f655;color:#93c5fd;}
.badge.data{background:#10b98122;border:1px solid #10b98155;color:#6ee7b7;}

/* ── 필터바 ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-bottom:14px;}
.fl{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-right:4px;}
.fbtn{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.fbtn:hover{border-color:var(--blue);color:var(--blue);}
.fbtn.active{background:var(--blue2);border-color:var(--blue2);color:#fff;}
.search-wrap{margin-left:auto;}
.search-wrap input{font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--text);width:220px;outline:none;transition:all .15s;}
.search-wrap input:focus{border-color:var(--blue);}
.search-wrap input::placeholder{color:var(--t3);}

/* ── 메인 ── */
main{padding:24px 36px;max-width:1600px;margin:0 auto;}

.notice{background:#10b98111;border:1px solid #10b98133;border-left:3px solid var(--green);border-radius:8px;padding:12px 16px;margin-bottom:22px;font-size:12px;color:var(--t2);line-height:1.9;}
.notice strong{color:var(--text);}

/* ── 그룹 섹션 ── */
.group-sec{margin-bottom:38px;}
.group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b2);}
.group-bar{width:3px;height:20px;border-radius:2px;}
.group-hdr h2{font-size:14px;font-weight:900;}
.group-cnt{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
.group-note{font-size:11px;color:var(--t3);margin-left:auto;}

/* ── 카드 ── */
.cards{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:12px;overflow:hidden;transition:border-color .15s;}
.card:hover{border-color:var(--b2);}

.card-head{display:grid;grid-template-columns:200px 1fr;background:var(--s2);}
.career-cell{padding:16px 18px;border-right:1px solid var(--b1);}
.career-name{font-weight:900;font-size:15px;}
.career-sub{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:4px;}
.career-univs{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;}
.univ-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-family:'DM Mono',monospace;white-space:nowrap;}
.univ-tag.top{background:#f59e0b15;border:1px solid #f59e0b44;color:#fcd34d;}
.univ-tag.nor{background:#10b98115;border:1px solid #10b98133;color:#6ee7b7;}

.univ-note-cell{padding:12px 16px;font-size:11px;color:var(--t3);line-height:1.7;display:flex;align-items:center;}

/* ── 과목 바디 ── */
.card-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;border-top:1px solid var(--b1);}

.subj-col-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;font-family:'DM Mono',monospace;}

/* ── 과목 아이템 ── */
.subj-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.subj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.subj-info{}
.subj-name{font-size:12px;font-weight:500;line-height:1.4;}
.subj-where{display:inline-flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap;}
.where-tag{font-size:10px;padding:1px 7px;border-radius:3px;font-family:'DM Mono',monospace;white-space:nowrap;}
.where-tag.fixed{background:#1d4ed822;border:1px solid #3b82f655;color:#93c5fd;}
.where-tag.g3{background:#10b98115;border:1px solid #10b98133;color:#6ee7b7;}  /* 택3 */
.where-tag.g1{background:#f59e0b15;border:1px solid #f59e0b33;color:#fbbf24;}  /* 택1 */
.where-tag.miss{background:#ef444415;border:1px solid #ef444433;color:#fca5a5;} /* 미개설 */
.where-tag.time{font-size:9px;background:var(--s3);border:1px solid var(--b2);color:var(--t3);}

/* ── 리스크 ── */
.risk-area{padding:10px 18px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-wrap:wrap;}
.risk-item{display:flex;align-items:flex-start;gap:5px;font-size:11px;padding:5px 10px;border-radius:6px;line-height:1.5;flex:1;min-width:240px;}
.risk-item.danger{background:#ef444411;border:1px solid #ef444433;color:#fca5a5;}
.risk-item.warn{background:#f59e0b11;border:1px solid #f59e0b33;color:#fcd34d;}
.risk-icon{flex-shrink:0;}

.no-results{text-align:center;padding:60px;color:var(--t3);}

/* 범례 */

/* ── 과목 클릭 커서 ── */
.subj-name{font-size:12px;font-weight:500;line-height:1.4;cursor:pointer;transition:color .15s;}
.subj-name:hover{color:#60a5fa;text-decoration:underline;}

/* ── 모달 오버레이 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:9999;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#0f1b2d;border:1px solid #2d4a7a88;border-radius:16px;
  width:100%;max-width:680px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.8);
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

.modal-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:22px 24px 16px;border-bottom:1px solid #1e3a5f66;position:sticky;top:0;
  background:#0f1b2d;z-index:1;
}
.modal-subject-label{font-size:10px;color:#60a5fa;font-family:'DM Mono',monospace;margin-bottom:6px;letter-spacing:.6px;}
.modal-title{font-size:20px;font-weight:900;color:#e2e8f0;}
.modal-close{
  background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;
  padding:0 4px;line-height:1;flex-shrink:0;margin-top:2px;
}
.modal-close:hover{color:#e2e8f0;}

.modal-body{padding:20px 24px 28px;}

.modal-section{margin-bottom:20px;}
.modal-section-title{
  font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:#64748b;font-family:'DM Mono',monospace;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid #1e3a5f66;
}
.modal-desc{font-size:13px;color:#cbd5e1;line-height:1.8;}
.modal-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}
.modal-table tr{border-bottom:1px solid #1e3a5f44;}
.modal-table th{text-align:left;color:#64748b;padding:7px 10px 7px 0;font-weight:500;white-space:nowrap;width:28%;}
.modal-table td{color:#cbd5e1;padding:7px 0;line-height:1.6;}
.modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.modal-chip{font-size:11px;padding:3px 10px;border-radius:12px;font-family:'DM Mono',monospace;}
.modal-chip.career{background:#3b82f622;border:1px solid #3b82f655;color:#93c5fd;}
.modal-chip.job{background:#10b98115;border:1px solid #10b98133;color:#6ee7b7;}
.modal-chip.field{background:#f59e0b15;border:1px solid #f59e0b33;color:#fcd34d;}
.modal-tag-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.modal-type-badge{
  display:inline-block;font-size:11px;padding:3px 10px;border-radius:4px;
  font-family:'DM Mono',monospace;font-weight:700;
}
.modal-type-badge.일반{background:#3b82f622;border:1px solid #3b82f655;color:#93c5fd;}
.modal-type-badge.진로{background:#10b98122;border:1px solid #10b98144;color:#6ee7b7;}
.modal-type-badge.융합{background:#8b5cf622;border:1px solid #8b5cf655;color:#c4b5fd;}
.modal-type-badge.공통{background:#f59e0b22;border:1px solid #f59e0b44;color:#fcd34d;}
.modal-no-data{color:#475569;font-size:12px;font-style:italic;}
.legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--t3);margin-bottom:20px;}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-title">
      <h1>창원경일고 진로별 과목 선택 가이드</h1>
      <p>
        <span class="badge school">창원경일고등학교</span>
        <span class="badge ver">2026 입학생 편제표 연계</span>
        <span class="badge data">22개 대학 실제 발표 기반</span>
        <span style="color:#1e3a5f">|</span>
        <span>2028학년도 · 2022 개정 교육과정</span>
      </p>
    </div>
  </div>
  <div class="filter-bar">
    <span class="fl">계열 ›</span>
    <button class="fbtn active" data-g="all">전체</button>
    <button class="fbtn" data-g="이공">이공계열</button>
    <button class="fbtn" data-g="의약">의약보건</button>
    <button class="fbtn" data-g="인문사회">인문사회</button>
    <button class="fbtn" data-g="교육">교육계열</button>
    <button class="fbtn" data-g="예체능">예체능</button>
    <div class="search-wrap">
      <input type="text" id="srch" placeholder="🔍  진로명·과목명 검색">
    </div>
  </div>
</header>

<!-- ── 과목 모달 ── -->
<div class="modal-overlay" id="subjectModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div>
        <div class="modal-subject-label" id="modalLabel">과목 안내</div>
        <div class="modal-title" id="modalTitle">과목명</div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<main>
  <div class="notice">
    <strong>이 가이드 활용법:</strong>
    각 과목 옆 태그가 경일고 편제표 위치를 나타냅니다.
    <strong style="color:#93c5fd">■ 지정</strong> = 전원 자동 이수 &nbsp;
    <strong style="color:#6ee7b7">■ ○군·택3</strong> = 해당 군에서 3과목 선택 가능 &nbsp;
    <strong style="color:#fbbf24">■ ○군·택1</strong> = 해당 군에서 반드시 1개만 선택 &nbsp;
    <strong style="color:#fca5a5">■ 미개설</strong> = 경일고 편제에 없음 → 공동교육과정 확인 필요
  </div>

  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:#10b981"></span>진로필수 과목</span>
    <span class="leg-item"><span class="leg-dot" style="background:#f59e0b"></span>핵심 권장 과목</span>
    <span class="leg-item"><span class="leg-dot" style="background:#3b82f6"></span>권장 과목</span>
    <span class="leg-item"><span class="leg-dot" style="background:#334155"></span>대안·선택 과목</span>
  </div>

  <div id="container"></div>
  <div class="no-results" id="noRes" style="display:none">검색 결과가 없습니다.</div>
</main>

<script>
// ══════════════════════════════════════════════════
// 과목 상세 안내 DB (2022 개정 교육과정 선택과목 안내서)
// ══════════════════════════════════════════════════
const SUBJ_DB = {

  /* ────── 국어 교과 ────── */

    label:'국어 교과', type:'일반선택',
    desc:'초등학교 및 중학교 공통 국어와 고등학교 공통국어1·공통국어2의 듣기·말하기 및 문법 영역을 심화·확장한 과목입니다. 학생들이 다양한 담화에 능동적으로 참여하여 효과적인 의사소통 능력을 기르고, 언어 자원의 탐구·화용 원리를 탐구합니다. 국어 문법과 의사소통 맥락에서의 규범적 사용 능력을 균형 있게 발전시킵니다.',
    core:['언어의 본질과 구조', '음운·단어·문장의 탐구', '담화와 의사소통 원리', '화법의 유형과 전략', '공손하고 격식 있는 언어 생활'],

  },
  '독서와 작문': {

  '문학': {
    label:'국어 교과', type:'일반선택',

    core:['문학의 개념과 갈래', '한국 문학의 흐름', '문학 작품의 수용과 비평', '문학과 공동체', '문학의 창작과 생산'],

  '독서 토론과 글쓰기': {

    fields:['국어교육학', '법학', '신문방송학', '철학']
  },

  /* ────── 수학 교과 ────── */
  '대수': {

function renderModal(subjectName) {
  const data = SUBJ_DB[subjectName];
  const modal = document.getElementById('subjectModal');
  const title = document.getElementById('modalTitle');
  const label = document.getElementById('modalLabel');
  const body  = document.getElementById('modalBody');

  title.textContent = subjectName;

  if (!data) {
    label.textContent = '과목 안내';
    body.innerHTML = `
      <div class="modal-section">
        <p class="modal-no-data">이 과목의 상세 안내 정보는 준비 중입니다.<br>대전시교육청 <em>2022 개정 교육과정 선택 과목 안내서</em>를 참고해 주세요.</p>
      </div>`;
  } else {
    label.textContent = data.label + ' · ' + data.type;
    const typeClass = data.type.replace('선택','').trim();
    body.innerHTML = `
      <div class="modal-section">
        <div class="modal-section-title">📋 과목 개요</div>
        <div class="modal-tag-row">
          <span class="modal-type-badge ${typeClass}">${data.type}</span>
        </div>
        <p class="modal-desc" style="margin-top:12px">${data.desc}</p>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">📚 핵심 학습 내용</div>
        <ul style="padding-left:18px;color:#cbd5e1;font-size:13px;line-height:2;">
          ${data.core.map(c=>`<li>${c}</li>`).join('')}
        </ul>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">🎓 관련 학과</div>
        <div class="modal-chips">
          ${data.fields.map(f=>`<span class="modal-chip field">${f}</span>`).join('')}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">💼 관련 직업</div>
        <div class="modal-chips">
          ${data.careers.map(c=>`<span class="modal-chip job">${c}</span>`).join('')}
        </div>
      </div>
    `;
  }
  modal.classList.add('open');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modalClose').addEventListener('click', () => {
    document.getElementById('subjectModal').classList.remove('open');
  });
  document.getElementById('subjectModal').addEventListener('click', e => {
    if (e.target === document.getElementById('subjectModal')) {
      document.getElementById('subjectModal').classList.remove('open');
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('subjectModal').classList.remove('open');
  });
});

function getLoc(name) {
  // 부분 매칭
  for (const [key, val] of Object.entries(KJLOC)) {
    if (name.includes(key) || key.includes(name.split('(')[0].trim())) return val;
  }
  return null;
}

function whereTag(subjectName) {
  const loc = getLoc(subjectName);
  if (!loc) return `<span class="where-tag miss">미개설</span>`;
  return `<span class="where-tag ${loc.type}">${loc.tag}</span><span class="where-tag time">${loc.time}</span>`;
}

// ── 렌더 ──
function subjectRow(s) {
  return `<div class="subj-item">
    <div class="subj-dot" style="background:${dotColor[s.dot]}"></div>
    <div class="subj-info">
      <div class="subj-name" onclick="renderModal('${s.name.replace(/'/g,"\\'")}')">
        ${s.name} <span style="font-size:10px;color:#3b82f688;margin-left:3px">▸</span>
      </div>
      <div class="subj-where">${whereTag(s.name)}</div>
    </div>
  </div>`;
}

function cardHTML(c) {
  const univHTML = [
    ...(c.univs.top||[]).map(u=>`<span class="univ-tag top">${u}</span>`),
    ...(c.univs.nor||[]).map(u=>`<span class="univ-tag nor">${u}</span>`),
  ].join('');

  const riskHTML = c.risk.length ? `<div class="risk-area">
    ${c.risk.map(r=>`<div class="risk-item ${r.level}">
      <span class="risk-icon">${r.level==='danger'?'🔴':'⚠️'}</span>
      <span>${r.text}</span>
    </div>`).join('')}
  </div>` : '';

  return `<div class="card" data-name="${c.name}" data-sub="${c.sub}">
    <div class="card-head">
      <div class="career-cell">
        <div class="career-name">${c.name}</div>
        <div class="career-sub">${c.sub}</div>
        <div class="career-univs">${univHTML}</div>
      </div>
      <div class="univ-note-cell">${c.univNote}</div>
    </div>
    <div class="card-body">
      <div>
        <div class="subj-col-title">🔴 핵심과목 (진로필수)</div>
        ${c.core.map(subjectRow).join('')}
      </div>
      <div>
        <div class="subj-col-title">🟡 권장과목</div>
        ${c.rec.map(subjectRow).join('')}
      </div>
      <div>
        <div class="subj-col-title">⚪ 대안·추가 과목</div>
        ${c.alt.map(subjectRow).join('')}
      </div>
    </div>
    ${riskHTML}
  </div>`;
}

function render(gFilter='all', search='') {
  const container = document.getElementById('container');
  container.innerHTML = '';
  let total = 0;

  groups.forEach(g => {
    if (gFilter !== 'all' && gFilter !== g.id) return;

    const filtered = g.careers.filter(c => {
      if (!search) return true;
      const t = search.toLowerCase();
      const all = c.name+c.sub+c.core.map(s=>s.name).join()+c.rec.map(s=>s.name).join()+c.alt.map(s=>s.name).join();
      return all.toLowerCase().includes(t);
    });

    if (!filtered.length) return;
    total += filtered.length;

    const sec = document.createElement('div');
    sec.className = 'group-sec';
    sec.innerHTML = `
      <div class="group-hdr">
        <div class="group-bar" style="background:${g.color}"></div>
        <h2 style="color:${g.color}">${g.label}</h2>
        <span class="group-cnt">${filtered.length}개 진로</span>
        <span class="group-note">${g.note}</span>
      </div>
      <div class="cards">${filtered.map(cardHTML).join('')}</div>
    `;
    container.appendChild(sec);
  });

  document.getElementById('noRes').style.display = total ? 'none' : 'block';
}

document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.g, document.getElementById('srch').value);
  });
});

document.getElementById('srch').addEventListener('input', e => {
  render(document.querySelector('.fbtn.active').dataset.g, e.target.value);
});

render();
</script>
